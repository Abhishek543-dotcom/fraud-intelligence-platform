# =============================================================================
# Spark Defaults - Fraud Intelligence Platform
# Optimized for local development on 8GB Docker memory budget
# =============================================================================

spark.master=spark://spark-master:7077
spark.app.name=FraudIntelligencePlatform

# --- Memory (constrained for local dev) ---
spark.executor.memory=512m
spark.driver.memory=512m
spark.executor.memoryOverhead=128m

# --- Shuffle & Partitioning ---
spark.sql.shuffle.partitions=4
spark.default.parallelism=4
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.coalescePartitions.minPartitionNum=1

# --- Iceberg Extensions ---
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# --- Nessie Catalog ---
spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri=http://nessie:19120/api/v1
spark.sql.catalog.nessie.ref=main
spark.sql.catalog.nessie.warehouse=s3a://lakehouse/

# --- S3/MinIO ---
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin123
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled=false

# --- Streaming ---
spark.sql.streaming.checkpointLocation=s3a://spark-checkpoints/
spark.sql.streaming.schemaInference=true
spark.sql.streaming.forceDeleteTempCheckpointLocation=true

# --- Serialization ---
spark.serializer=org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max=128m

# --- UI ---
spark.ui.showConsoleProgress=true
spark.ui.enabled=true
