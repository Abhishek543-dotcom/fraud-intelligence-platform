# =============================================================================
# Log4j2 Configuration for Spark Streaming Jobs
# =============================================================================

rootLogger.level=WARN
rootLogger.appenderRef.stdout.ref=console

appender.console.type=Console
appender.console.name=console
appender.console.target=SYSTEM_ERR
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Application loggers
logger.fraud.name=fraud_intelligence
logger.fraud.level=INFO
logger.fraud.appenderRef.stdout.ref=console

logger.streaming.name=streaming
logger.streaming.level=INFO
logger.streaming.appenderRef.stdout.ref=console

# Reduce noise from libraries
logger.spark.name=org.apache.spark
logger.spark.level=WARN

logger.kafka.name=org.apache.kafka
logger.kafka.level=WARN

logger.iceberg.name=org.apache.iceberg
logger.iceberg.level=INFO

logger.hadoop.name=org.apache.hadoop
logger.hadoop.level=WARN

logger.nessie.name=org.projectnessie
logger.nessie.level=INFO
