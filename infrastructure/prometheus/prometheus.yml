# ============================================================
# Prometheus Configuration
# Scrape targets for the fraud intelligence platform
# ============================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ML Service — exposes /metrics via prometheus-client
  - job_name: "ml-service"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["ml-service:8000"]
        labels:
          service: "fraud-ml-service"

  # NOTE: The targets below require additional sidecars/exporters that are
  # not deployed in this project. Re-enable once the matching exporters are
  # added (kafka JMX exporter, redis-exporter, MinIO auth, Spark metrics).
  #
  # - job_name: "backend"  # FastAPI does not expose /metrics by default
  # - job_name: "kafka"    # needs JMX exporter at :9404
  # - job_name: "redis"    # needs redis-exporter
  # - job_name: "minio"    # needs MINIO_PROMETHEUS_AUTH_TYPE=public
  # - job_name: "spark-master"  # needs spark.metrics enabled in conf
  # - job_name: "spark-worker"
