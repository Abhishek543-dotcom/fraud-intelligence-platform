apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: fraud-platform
spec:
  selector:
    app: spark-master
  ports:
    - name: webui
      port: 8080
      targetPort: 8080
    - name: master
      port: 7077
      targetPort: 7077
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: spark-worker
  namespace: fraud-platform
spec:
  selector:
    app: spark-worker
  ports:
    - name: webui
      port: 8081
      targetPort: 8081
  type: ClusterIP
