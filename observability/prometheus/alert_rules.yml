# =============================================================================
# Prometheus Alert Rules — Fraud Intelligence Platform
# =============================================================================
groups:
  - name: kafka_alerts
    rules:
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumergroup_lag_sum > 10000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kafka consumer lag exceeds 10,000 messages"
          description: "Consumer group {{ $labels.consumergroup }} on topic {{ $labels.topic }} has lag {{ $value }} for more than 5 minutes."

      - alert: KafkaBrokerDown
        expr: up{job="kafka-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka broker is unreachable"
          description: "Kafka exporter target {{ $labels.instance }} is down."

  - name: spark_alerts
    rules:
      - alert: SparkBatchDurationHigh
        expr: spark_streaming_lastCompletedBatch_processingTime_seconds > 60
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Spark batch processing time exceeds 60s"
          description: "Streaming batch took {{ $value }}s, indicating processing bottleneck."

      - alert: SparkWorkerDown
        expr: up{job="spark-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Spark worker is unreachable"
          description: "Spark worker at {{ $labels.instance }} is down."

  - name: api_alerts
    rules:
      - alert: APILatencyHigh
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="backend"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P99 latency exceeds 500ms"
          description: "Backend API P99 latency is {{ $value }}s."

      - alert: APIErrorRateHigh
        expr: rate(http_requests_total{job="backend", status=~"5.."}[5m]) / rate(http_requests_total{job="backend"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API error rate exceeds 5%"
          description: "Backend API 5xx error rate is {{ $value | humanizePercentage }}."

  - name: fraud_alerts
    rules:
      - alert: FraudScoreServiceDown
        expr: up{job="ml-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Fraud scoring ML service is down"
          description: "ML fraud scoring service is unreachable."

      - alert: HighFraudRate
        expr: rate(fraud_alerts_total[10m]) / (rate(fraud_transactions_total[10m]) + 0.001) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Abnormally high fraud rate detected (>10%)"
          description: "Fraud rate is {{ $value | humanizePercentage }}, possible coordinated attack."

  - name: infrastructure_alerts
    rules:
      - alert: DiskSpaceHigh
        expr: (1 - node_filesystem_avail_bytes / node_filesystem_size_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage exceeds 85%"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanizePercentage }} full."

      - alert: MemoryPressure
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage exceeds 90%"
          description: "Host {{ $labels.instance }} memory usage is {{ $value | humanizePercentage }}."
