# =============================================================================
# Prometheus Scrape Configuration — Fraud Intelligence Platform
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml
  - /etc/prometheus/recording_rules.yml

# Optional: remote write to Grafana Cloud
# remote_write:
#   - url: https://prometheus-prod-01-us-west-0.grafana.net/api/prom/push
#     basic_auth:
#       username: "<instance-id>"
#       password: "<api-key>"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
    scrape_interval: 15s

  - job_name: "spark-master"
    metrics_path: "/metrics/prometheus"
    static_configs:
      - targets: ["spark-master:8080"]
    scrape_interval: 30s

  - job_name: "spark-worker"
    metrics_path: "/metrics/prometheus"
    static_configs:
      - targets: ["spark-worker:8081"]
    scrape_interval: 30s

  - job_name: "backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
    scrape_interval: 10s

  - job_name: "ml-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ml-service:8001"]
    scrape_interval: 15s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s

  - job_name: "minio"
    metrics_path: "/minio/v2/metrics/cluster"
    static_configs:
      - targets: ["minio:9000"]
    scrape_interval: 30s
