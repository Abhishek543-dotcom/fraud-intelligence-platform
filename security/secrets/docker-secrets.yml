# Docker Secrets Configuration
# Use with: docker secret create <name> <file>
# These are references; actual secret values should NEVER be in version control.
version: "3.9"

secrets:
  postgres_password:
    external: true
  minio_secret_key:
    external: true
  jwt_secret_key:
    external: true
  airflow_fernet_key:
    external: true
  grafana_admin_password:
    external: true
