# =============================================================================
# Fraud Intelligence Platform - Docker Compose
# Optimized for Apple Silicon (ARM64) with 8GB Docker memory budget
# =============================================================================

x-common: &common
  restart: unless-stopped
  networks:
    - fraud-net

services:
  # ===========================================================================
  # Kafka (KRaft Mode - No Zookeeper)
  # ===========================================================================
  kafka:
    <<: *common
    image: bitnamilegacy/kafka:3.7
    container_name: fraud-kafka
    profiles: ["core"]
    ports:
      - "9094:9094"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_KRAFT_CLUSTER_ID=${KAFKA_KRAFT_CLUSTER_ID}
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_CFG_NUM_PARTITIONS=6
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_CFG_LOG_CLEANUP_POLICY=delete
      - KAFKA_HEAP_OPTS=-Xmx384m -Xms384m
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # PostgreSQL
  # ===========================================================================
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: fraud-postgres
    profiles: ["core"]
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # Redis
  # ===========================================================================
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: fraud-redis
    profiles: ["core"]
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================================================
  # MinIO (S3-compatible Object Storage)
  # ===========================================================================
  minio:
    <<: *common
    image: minio/minio:latest
    container_name: fraud-minio
    profiles: ["core"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  minio-init:
    <<: *common
    image: minio/mc:latest
    container_name: fraud-minio-init
    profiles: ["core"]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-buckets.sh
    volumes:
      - ./infrastructure/minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
    deploy:
      resources:
        limits:
          memory: 64M

  # ===========================================================================
  # Nessie (Iceberg Catalog)
  # ===========================================================================
  nessie:
    <<: *common
    image: ghcr.io/projectnessie/nessie:latest
    container_name: fraud-nessie
    profiles: ["core"]
    ports:
      - "19120:19120"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:19120/api/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # Apache Spark (Master)
  # ===========================================================================
  spark-master:
    <<: *common
    build:
      context: ./infrastructure/docker/spark
      dockerfile: Dockerfile
    container_name: fraud-spark-master
    profiles: ["core"]
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_DAEMON_MEMORY=192m
      - PYTHONPATH=/opt/spark-app
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - AWS_REGION=us-east-1
    volumes:
      - ./streaming:/opt/spark-app/streaming
      - ./lakehouse:/opt/spark-app/lakehouse
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/json/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Apache Spark (Worker)
  # ===========================================================================
  spark-worker:
    <<: *common
    build:
      context: ./infrastructure/docker/spark
      dockerfile: Dockerfile
    container_name: fraud-spark-worker
    profiles: ["core"]
    ports:
      - "8081:8081"
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_DAEMON_MEMORY=128m
      - PYTHONPATH=/opt/spark-app
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - AWS_REGION=us-east-1
    volumes:
      - ./streaming:/opt/spark-app/streaming
      - ./lakehouse:/opt/spark-app/lakehouse
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/json/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2048M

  # ===========================================================================
  # Airflow Webserver
  # ===========================================================================
  airflow-webserver:
    <<: *common
    build:
      context: ./infrastructure/docker/airflow
      dockerfile: Dockerfile
    container_name: fraud-airflow-webserver
    profiles: ["core"]
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=${AIRFLOW__WEBSERVER__EXPOSE_CONFIG}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/logs
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USER}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./streaming:/opt/airflow/streaming
      - ./lakehouse:/opt/airflow/lakehouse
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --role Admin --username $${_AIRFLOW_WWW_USER_USERNAME} --password $${_AIRFLOW_WWW_USER_PASSWORD} --firstname Admin --lastname User --email admin@fraud-platform.local || true &&
        airflow webserver
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Airflow Scheduler
  # ===========================================================================
  airflow-scheduler:
    <<: *common
    build:
      context: ./infrastructure/docker/airflow
      dockerfile: Dockerfile
    container_name: fraud-airflow-scheduler
    profiles: ["core"]
    depends_on:
      airflow-webserver:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/logs
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./streaming:/opt/airflow/streaming
      - ./lakehouse:/opt/airflow/lakehouse
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1024M

  # ===========================================================================
  # FastAPI Backend
  # ===========================================================================
  backend:
    <<: *common
    build:
      context: ./infrastructure/docker/backend
      dockerfile: Dockerfile
    container_name: fraud-backend
    profiles: ["core", "frontend"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - NESSIE_URI=${NESSIE_URI}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=${BACKEND_PORT}
      - BACKEND_WORKERS=${BACKEND_WORKERS}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # React Frontend
  # ===========================================================================
  frontend:
    <<: *common
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
    container_name: fraud-frontend
    profiles: ["frontend"]
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================================================
  # Transaction Simulator
  # ===========================================================================
  simulator:
    <<: *common
    build:
      context: ./infrastructure/docker/simulator
      dockerfile: Dockerfile
    container_name: fraud-simulator
    profiles: ["core"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER}
      - REDIS_URL=${REDIS_URL}
      - LOG_LEVEL=${LOG_LEVEL}
      - TARGET_TPS=${TARGET_TPS:-50}
      - PYTHONPATH=/app
    working_dir: /app
    volumes:
      - ./streaming:/app/streaming
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f streaming.producers.transaction_simulator || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # Ollama (LLM)
  # ===========================================================================
  ollama:
    <<: *common
    image: ollama/ollama:latest
    container_name: fraud-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2048M

  # ===========================================================================
  # ChromaDB (Vector Store)
  # ===========================================================================
  chromadb:
    <<: *common
    image: chromadb/chroma:latest
    container_name: fraud-chromadb
    profiles: ["ai"]
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v2/heartbeat\").read()' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # ML Service
  # ===========================================================================
  ml-service:
    <<: *common
    build:
      context: ./infrastructure/docker/ml-service
      dockerfile: Dockerfile
    container_name: fraud-ml-service
    profiles: ["ml"]
    ports:
      - "8003:8000"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./ml:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Prometheus
  # ===========================================================================
  prometheus:
    <<: *common
    image: prom/prometheus:latest
    container_name: fraud-prometheus
    profiles: ["monitoring"]
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=256MB'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================================================
  # Grafana
  # ===========================================================================
  grafana:
    <<: *common
    image: grafana/grafana:latest
    container_name: fraud-grafana
    profiles: ["monitoring"]
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:${GRAFANA_PORT}
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================================================
  # Spark Streaming Driver (always-on fraud detection pipeline)
  # ===========================================================================
  spark-streaming-app:
    <<: *common
    build:
      context: ./infrastructure/docker/spark
      dockerfile: Dockerfile
    container_name: fraud-spark-streaming-app
    profiles: ["core"]
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy
    environment:
      - PYTHONPATH=/opt/spark-app
      - KAFKA_BROKER=kafka:9092
      - NESSIE_URI=http://nessie:19120/api/v1
      - WAREHOUSE=s3a://lakehouse/warehouse
      - ICEBERG_WAREHOUSE=s3a://lakehouse/warehouse
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - AWS_REGION=us-east-1
    volumes:
      - ./streaming:/opt/spark-app/streaming
      - ./lakehouse:/opt/spark-app/lakehouse
    working_dir: /opt/spark-app
    entrypoint: []
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --name FraudDetectionStreaming
      --conf spark.driver.host=spark-streaming-app
      --conf spark.driver.bindAddress=0.0.0.0
      --conf spark.executor.memory=512m
      --conf spark.driver.memory=512m
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
      /opt/spark-app/streaming/spark_jobs/fraud_detection_streaming.py
    deploy:
      resources:
        limits:
          memory: 1024M

# =============================================================================
# Networks
# =============================================================================
networks:
  fraud-net:
    driver: bridge
    name: fraud-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  kafka-data:
    driver: local
  minio-data:
    driver: local
  postgres-data:
    driver: local
  spark-checkpoints:
    driver: local
  iceberg-warehouse:
    driver: local
  redis-data:
    driver: local
  ollama-models:
    driver: local
  chromadb-data:
    driver: local
  airflow-logs:
    driver: local
  airflow-dags:
    driver: local
